title: Sobre Nosotros
icon: 👨‍🍳

columns:
  main:
    width: 2/3
    sections:
      hero:
        type: fields
        fields:
          title:
            label: Título
            type: text
            translate: true
            default: Sobre Aurora

          subtitle:
            label: Subtítulo (Cargo)
            type: text
            translate: true
            placeholder: "Chef Profesional | Montreal, Quebec"

          portrait:
            label: Foto Principal del Chef
            type: files
            max: 1
            layout: cards
            size: large
            help: Foto horizontal del chef en accion (recomendado 1600x900px o mas ancha)

          intro:
            label: Introducción
            type: textarea
            translate: true
            size: small
            help: Texto breve que aparece junto a la foto

      bio:
        type: fields
        fields:
          bio:
            label: Biografía
            type: textarea
            translate: true
            size: large
            help: Historia completa del chef

          quote:
            label: Cita / Frase
            type: text
            translate: true
            icon: quote
            help: Una frase inspiradora que te defina

      education:
        type: fields
        fields:
          education_title:
            label: Título de Sección
            type: text
            default: Formación Profesional

          education:
            label: Formación
            type: structure
            fields:
              year:
                label: Año
                type: text
                width: 1/4

              title:
                label: Título / Certificación
                type: text
                width: 3/4

              institution:
                label: Institución
                type: text

              description:
                label: Descripción
                type: textarea
                size: small

      experience:
        type: fields
        fields:
          experience_title:
            label: Título de Sección
            type: text
            default: Trayectoria Profesional

          experience:
            label: Experiencia Laboral
            type: structure
            fields:
              period:
                label: Período
                type: text
                width: 1/4
                placeholder: "2023 - 2024"

              position:
                label: Puesto
                type: text
                width: 3/4

              place:
                label: Lugar / Empresa
                type: text

              description:
                label: Descripción
                type: textarea
                size: small

      signature_dishes:
        type: fields
        fields:
          signature_dishes_title:
            label: Titulo de Seccion
            type: text
            translate: true
            default: Mis Platos Insignia

          signature_dishes:
            label: Platos Insignia
            type: structure
            max: 4
            fields:
              title:
                label: Nombre del Plato
                type: text
                translate: true
                width: 1/2

              image:
                label: Foto del Plato
                type: files
                max: 1
                layout: cards
                width: 1/2
                help: Foto horizontal del plato (recomendado 1200x800px)

              description:
                label: Descripcion
                type: textarea
                translate: true
                size: small
                help: Breve descripcion del plato y su significado

      philosophy:
        type: fields
        fields:
          philosophy_title:
            label: Titulo de Seccion
            type: text
            default: Mi Filosofia Culinaria

          philosophy:
            label: Filosofia
            type: textarea
            translate: true
            size: medium

  sidebar:
    width: 1/3
    sections:
      specialties:
        type: fields
        fields:
          specialties_title:
            label: Título de Sección
            type: text
            default: Especialidades

          specialties:
            label: Especialidades
            type: tags
            translate: true
            help: Lista de especialidades culinarias

      notable:
        type: fields
        fields:
          notable_places_title:
            label: Título de Sección
            type: text
            default: Lugares Destacados

          notable_places:
            label: Lugares Notables
            type: textarea
            size: small
            help: Lista de restaurantes/hoteles destacados

      contact:
        type: fields
        fields:
          contact_title:
            label: Título de Sección
            type: text
            default: Contacto

          contact_intro:
            label: Texto de Contacto
            type: textarea
            size: small

          email:
            label: Email
            type: email

      seo:
        type: fields
        fields:
          seo_title:
            label: SEO Título
            type: text
            counter: 60

          seo_description:
            label: SEO Descripción
            type: textarea
            counter: 160
