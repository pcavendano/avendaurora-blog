title: Sobre Nosotros
icon: 👨‍🍳

columns:
  main:
    width: 2/3
    sections:
      hero:
        type: fields
        fields:
          title:
            label: Título
            type: text
            translate: true
            default: Sobre Aurora

          subtitle:
            label: Subtítulo (Cargo)
            type: text
            translate: true
            placeholder: "Chef Profesional | Montreal, Quebec"

          portrait:
            label: Foto de Perfil
            type: files
            max: 1
            layout: cards
            size: large
            help: Imagen profesional del chef (recomendado 500x600px)

          intro:
            label: Introducción
            type: textarea
            translate: true
            size: small
            help: Texto breve que aparece junto a la foto

      bio:
        type: fields
        fields:
          bio:
            label: Biografía
            type: textarea
            translate: true
            size: large
            help: Historia completa del chef

          quote:
            label: Cita / Frase
            type: text
            translate: true
            icon: quote
            help: Una frase inspiradora que te defina

      education:
        type: fields
        fields:
          education_title:
            label: Título de Sección
            type: text
            default: Formación Profesional

          education:
            label: Formación
            type: structure
            fields:
              year:
                label: Año
                type: text
                width: 1/4

              title:
                label: Título / Certificación
                type: text
                width: 3/4

              institution:
                label: Institución
                type: text

              description:
                label: Descripción
                type: textarea
                size: small

      experience:
        type: fields
        fields:
          experience_title:
            label: Título de Sección
            type: text
            default: Trayectoria Profesional

          experience:
            label: Experiencia Laboral
            type: structure
            fields:
              period:
                label: Período
                type: text
                width: 1/4
                placeholder: "2023 - 2024"

              position:
                label: Puesto
                type: text
                width: 3/4

              place:
                label: Lugar / Empresa
                type: text

              description:
                label: Descripción
                type: textarea
                size: small

      philosophy:
        type: fields
        fields:
          philosophy_title:
            label: Título de Sección
            type: text
            default: Mi Filosofía Culinaria

          philosophy:
            label: Filosofía
            type: textarea
            translate: true
            size: medium

  sidebar:
    width: 1/3
    sections:
      specialties:
        type: fields
        fields:
          specialties_title:
            label: Título de Sección
            type: text
            default: Especialidades

          specialties:
            label: Especialidades
            type: tags
            translate: true
            help: Lista de especialidades culinarias

      notable:
        type: fields
        fields:
          notable_places_title:
            label: Título de Sección
            type: text
            default: Lugares Destacados

          notable_places:
            label: Lugares Notables
            type: textarea
            size: small
            help: Lista de restaurantes/hoteles destacados

      contact:
        type: fields
        fields:
          contact_title:
            label: Título de Sección
            type: text
            default: Contacto

          contact_intro:
            label: Texto de Contacto
            type: textarea
            size: small

          email:
            label: Email
            type: email

      seo:
        type: fields
        fields:
          seo_title:
            label: SEO Título
            type: text
            counter: 60

          seo_description:
            label: SEO Descripción
            type: textarea
            counter: 160
