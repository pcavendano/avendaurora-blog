title: Home / Inicio
icon: 🏠

columns:
  main:
    width: 2/3
    sections:
      hero:
        type: fields
        fields:
          hero_title:
            label: Título del Hero
            type: text
            translate: true
            default: Chef Aurora Avendaño

          hero_subtitle:
            label: Subtítulo
            type: text
            translate: true

          hero_description:
            label: Descripción
            type: textarea
            translate: true
            size: small

          hero_image:
            label: Foto de Aurora
            type: files
            max: 1
            layout: cards
            help: Imagen principal del hero (recomendado 800x800px)

          hero_cta_text:
            label: Texto del Botón Principal
            type: text
            translate: true
            default: Conoce Mi Historia

          hero_cta_link:
            label: Link del Botón Principal
            type: pages
            max: 1

      about_section:
        type: fields
        fields:
          about_title:
            label: Título Sección Aurora
            type: text
            translate: true
            default: Mi Historia

          about_subtitle:
            label: Subtítulo (cargo/ubicación)
            type: text
            translate: true
            help: "Ej: Chef Profesional | Montreal, Quebec"

          about_text:
            label: Texto de Presentación
            type: textarea
            translate: true
            help: Breve biografía que aparece en la página principal

          about_image:
            label: Foto de Aurora
            type: files
            max: 1

      featured:
        type: fields
        fields:
          featured_title:
            label: Título Sección Recetas
            type: text
            translate: true
            default: Desde Mi Cocina
            help: "Ej: Desde Mi Cocina, Mis Recetas, Mi Trabajo"

          featured_recipes:
            label: Recetas Destacadas
            type: pages
            query: site.find('recetas').children
            max: 8
            help: Selecciona las recetas que mejor representen tu trabajo

          featured_ingredient:
            label: Ingrediente Destacado (Sabías que...)
            type: pages
            query: site.find('ingredientes').children
            max: 1

  sidebar:
    width: 1/3
    sections:
      categories:
        type: fields
        fields:
          show_categories:
            label: Mostrar Categorías
            type: toggle
            default: true

          categories_title:
            label: Título Sección Categorías
            type: text
            translate: true
            default: Explora por Categoría
