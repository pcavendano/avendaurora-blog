title: Recetas
icon: 📖

options:
  delete: false
  changeSlug: false

columns:
  main:
    width: 2/3
    sections:
      content:
        type: fields
        fields:
          title:
            label: Título de la Página
            type: text
            translate: true
            default: Recetas

          description:
            label: Descripción
            type: textarea
            translate: true

          cover:
            label: Imagen de Cabecera
            type: files
            max: 1
            layout: cards
            size: large

      recipes:
        type: pages
        headline: Recetas
        template: recipe
        status: all
        layout: cards
        size: small
        info: "{{ page.category }} | {{ page.prep_time }} min"
        image:
          query: page.cover.toFile
          ratio: 3/2
          cover: true

  sidebar:
    width: 1/3
    sections:
      filter:
        type: fields
        fields:
          default_category:
            label: Categoría por Defecto
            type: select
            empty: Todas
            options:
              antojitos: Antojitos
              platos-fuertes: Platos Fuertes
              sopas-caldos: Sopas
              salsas: Salsas
              mariscos: Mariscos
              desayunos: Desayunos
              postres: Postres
              bebidas: Bebidas
