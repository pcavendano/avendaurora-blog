title: Recetas
icon: 📖

options:
  delete: false
  changeSlug: false

tabs:
  overview:
    label: Configuración
    icon: settings
    columns:
      main:
        width: 2/3
        sections:
          ai_import:
            type: info
            label: Importar con IA
            theme: positive
            text: |
              🪄 **Importa una receta desde una imagen.**

              Arrastra una foto de una receta y la IA extraerá el contenido para revisión antes de guardarla como borrador.

              [**Abrir importador →**](../importar-receta)

          content:
            type: fields
            fields:
              title:
                label: Título de la Página
                type: text
                translate: true
                default: Recetas

              description:
                label: Descripción
                type: textarea
                translate: true

              cover:
                label: Imagen de Cabecera
                type: files
                max: 1
                layout: cards
                size: large

              categories:
                label: Categorías
                type: structure
                help: Añade, edita o elimina categorías. Los cambios se reflejan en el editor de recetas, en los filtros públicos y en el importador.
                fields:
                  slug:
                    label: Slug
                    type: text
                    required: true
                    width: 1/4
                    help: minúsculas, guiones, sin espacios
                  label_es:
                    label: Nombre (ES)
                    type: text
                    required: true
                    width: 1/4
                  label_en:
                    label: Name (EN)
                    type: text
                    width: 1/4
                  label_fr:
                    label: Nom (FR)
                    type: text
                    width: 1/4

              countries:
                label: Países
                type: structure
                help: País de origen de la receta. Úsalo como filtro principal (p.ej. Mexicana, Peruana, Francesa).
                fields:
                  slug:
                    label: Slug
                    type: text
                    required: true
                    width: 1/4
                    help: minúsculas, guiones, sin espacios (p.ej. "mexico")
                  label_es:
                    label: Nombre (ES)
                    type: text
                    required: true
                    width: 1/4
                  label_en:
                    label: Name (EN)
                    type: text
                    width: 1/4
                  label_fr:
                    label: Nom (FR)
                    type: text
                    width: 1/4

      sidebar:
        width: 1/3
        sections:
          filter:
            type: fields
            fields:
              default_category:
                label: Categoría por Defecto
                type: select
                empty: Todas
                options:
                  antojitos: Antojitos
                  platos-fuertes: Platos Fuertes
                  sopas-caldos: Sopas
                  salsas: Salsas
                  mariscos: Mariscos
                  desayunos: Desayunos
                  postres: Postres
                  bebidas: Bebidas

  mine:
    label: Mis Recetas
    icon: user
    columns:
      main:
        width: 1/1
        sections:
          my_recipes:
            type: pages
            headline: Recetas creadas por mí
            template: recipe
            status: all
            layout: list
            size: medium
            limit: 20
            info: "{{ page.category }} | {{ page.status }}"
            search: true
            query: page.children.filterBy('created_by', kirby.user.id)
            empty: No has creado ninguna receta aún.

  drafts:
    label: Borradores
    icon: edit
    columns:
      main:
        width: 1/1
        sections:
          draft_recipes:
            type: pages
            headline: Borradores (por completar)
            template: recipe
            status: drafts
            layout: list
            size: medium
            limit: 20
            info: "{{ page.category }} | {{ page.status }}"
            search: true
            empty: No hay borradores. Cuando importes o crees una receta, aparecerá aquí.

  review:
    label: En Revisión
    icon: preview
    columns:
      main:
        width: 1/1
        sections:
          review_recipes:
            type: pages
            headline: En Revisión
            template: recipe
            status: unlisted
            layout: list
            size: medium
            limit: 20
            info: "{{ page.category }} | {{ page.status }}"
            search: true
            empty: No hay recetas en revisión.

  published:
    label: Publicadas
    icon: check
    columns:
      main:
        width: 1/1
        sections:
          published_recipes:
            type: pages
            headline: Publicadas
            template: recipe
            status: listed
            layout: list
            size: medium
            limit: 20
            info: "{{ page.category }} | {{ page.status }}"
            search: true
            empty: Aún no hay recetas publicadas.

  all:
    label: Todas
    icon: page
    columns:
      main:
        width: 1/1
        sections:
          all_recipes:
            type: pages
            headline: Todas las recetas
            template: recipe
            status: all
            layout: list
            size: medium
            limit: 20
            info: "{{ page.category }} | {{ page.status }}"
            search: true
